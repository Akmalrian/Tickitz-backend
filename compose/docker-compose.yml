services:
  container-db:
    image: postgres:17.10-alpine3.23
    env_file:
      - ./psql/.env
    volumes:
      - psql:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - backend-network

  container-chace:
    build: ./rdb
    volumes:
      - rdb:/data
    ports:
      - "63879:6379"
    networks:
      - backend-network


networks:
  backend-network:

volumes:
  rdb:
  psql: